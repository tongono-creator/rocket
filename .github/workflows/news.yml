name: Post News to Facebook

on:
  schedule:
    - cron: '30 6 * * *'  # 13:30 BKK (target 14:00)
  workflow_dispatch:       # รันมือได้จาก GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news script
        env:
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          PAGE_ID:           ${{ secrets.PAGE_ID }}
          IMMEDIATE:         ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python news.py

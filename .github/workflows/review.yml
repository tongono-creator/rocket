name: Product Review Post (CatDumb Style)

on:
  # schedule:
  #   # à¸­à¸±à¸‡à¸„à¸²à¸£, à¸žà¸¤à¸«à¸±à¸ªà¸šà¸”à¸µ, à¹€à¸ªà¸²à¸£à¹Œ 04:45 Bangkok (21:45 UTC)
  #   - cron: '45 21 * * 2,4,6'
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Request write permissions or use default token to allow push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests openpyxl Pillow numpy playwright
          playwright install --with-deps chromium

      - name: Run review script
        env:
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          PAGE_ACCESS_TOKEN:    ${{ secrets.PAGE_ACCESS_TOKEN }}
          PAGE_ID:              ${{ secrets.PAGE_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          IMGBB_API_KEY:        ${{ secrets.IMGBB_API_KEY }}
          IMMEDIATE:            ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python review.py

      - name: Commit and push if Excel updated
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add review_products.xlsx
          if git diff --cached --quiet; then
            echo "No changes in review_products.xlsx"
          else
            git commit -m "Update review_products.xlsx posted status [skip ci]"
            # Stash other changes so pull-rebase succeeds
            HAS_CHANGES=$(git status --porcelain | grep -v "review_products.xlsx" || true)
            if [ -n "$HAS_CHANGES" ]; then
              echo "Stashing unstaged changes before pull..."
              git stash --include-untracked
              git pull --rebase
              echo "Restoring stashed changes..."
              git stash pop || true
            else
              git pull --rebase
            fi
            git push
          fi

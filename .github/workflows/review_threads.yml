name: Product Review to Threads

on:
  schedule:
    # รีวิวสินค้าสัปดาห์ละ 2 ครั้ง (พุธ, เสาร์ เวลา 18:40 น. ตามเวลาไทย)
    - cron: '40 11 * * 3,6'
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests openpyxl Pillow

      - name: Run review script
        env:
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          IMGBB_API_KEY:        ${{ secrets.IMGBB_API_KEY }}
          IMMEDIATE:            ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: mkdir -p output && python review_threads.py > output/review_threads_run.log 2>&1

      - name: Commit and push if Excel updated
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add review_products.xlsx output/review_threads_run.log || true
          if git diff --cached --quiet; then
            echo "No changes in review_products.xlsx"
          else
            git commit -m "Update review_products.xlsx and logs [skip ci]"
            # Stash other changes so pull-rebase succeeds
            HAS_CHANGES=$(git status --porcelain | grep -v "review_products.xlsx" || true)
            if [ -n "$HAS_CHANGES" ]; then
              echo "Stashing unstaged changes before pull..."
              git stash --include-untracked
              git pull --rebase
              echo "Restoring stashed changes..."
              git stash pop || true
            else
              git pull --rebase
            fi
            git push
          fi

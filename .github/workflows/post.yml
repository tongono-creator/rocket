name: Post to Facebook

on:
  schedule:
    - cron: '0 22 * * *'  # 05:00 BKK
    - cron: '0 5 * * *'   # 12:00 BKK
    - cron: '0 10 * * *'  # 17:00 BKK
    - cron: '0 14 * * *'  # 21:00 BKK
  workflow_dispatch:       # รันมือได้จาก GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run post script
        env:
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          PAGE_ID:           ${{ secrets.PAGE_ID }}
        run: python post.py

      - name: Commit and push if history updated
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f posted_history.txt ]; then
            git add posted_history.txt
            if git diff --cached --quiet; then
              echo "No changes in posted_history.txt"
            else
              git commit -m "chore: update posted_history.txt history [skip ci]"
              git pull --rebase
              git push
            fi
          fi

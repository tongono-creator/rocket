name: All-in-One Bot Controller

on:
  workflow_dispatch:
    inputs:
      bot_to_run:
        description: 'เลือกบอตที่ต้องการรัน (Select bot to run)'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'post'
          - 'meme'
          - 'news'
          - 'quotes'
          - 'review'
          - 'promo'
          - 'threads'
          - 'reply_threads'
          - 'lotto'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt beautifulsoup4

      - name: Run selected script
        env:
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          PAGE_ACCESS_TOKEN:    ${{ secrets.PAGE_ACCESS_TOKEN }}
          PAGE_ID:              ${{ secrets.PAGE_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          IMGBB_API_KEY:        ${{ secrets.IMGBB_API_KEY }}
        run: |
          CHOICE="${{ github.event.inputs.bot_to_run }}"
          echo "Selected choice: $CHOICE"
          
          if [ "$CHOICE" = "all" ]; then
            echo "Running all posts sequentially with a 2-minute delay in between..."
            
            echo "1. Running post.py (Post to Facebook)..."
            python post.py
            sleep 120
            
            echo "2. Running meme.py (Meme Post)..."
            python meme.py
            sleep 120
            
            echo "3. Running news.py (Post News)..."
            python news.py
            sleep 120
            
            echo "4. Running quotes.py (Quotes Bot)..."
            python quotes.py
            sleep 120
            
            echo "5. Running threads.py (Threads Post)..."
            python threads.py
            
          elif [ "$CHOICE" = "post" ]; then
            python post.py
          elif [ "$CHOICE" = "meme" ]; then
            python meme.py
          elif [ "$CHOICE" = "news" ]; then
            python news.py
          elif [ "$CHOICE" = "quotes" ]; then
            python quotes.py
          elif [ "$CHOICE" = "review" ]; then
            python review.py
          elif [ "$CHOICE" = "promo" ]; then
            python promo.py
          elif [ "$CHOICE" = "threads" ]; then
            python threads.py
          elif [ "$CHOICE" = "reply_threads" ]; then
            python reply_threads.py
          elif [ "$CHOICE" = "lotto" ]; then
            python lotto_poster.py
          fi

      - name: Commit and push if Excel updated
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add review_products.xlsx
          if ! git diff --cached --quiet; then
            echo "Staging and pushing review_products.xlsx changes..."
            git commit -m "chore: update review_products.xlsx posted status [skip ci]"
            git pull --rebase
            git push
          else
            echo "No changes in review_products.xlsx"
          fi

      - name: Commit and push if history files updated
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          python merge_history.py

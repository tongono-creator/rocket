name: Meme Post (Daily Comic)

on:
  schedule:
    # 05:00 BKK = 22:00 UTC
    - cron: '0 22 * * *'
    # 12:00 BKK = 05:00 UTC
    - cron: '0 5 * * *'
    # 17:00 BKK = 10:00 UTC
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  meme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run meme script
        env:
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          PAGE_ID:           ${{ secrets.PAGE_ID }}
        run: python meme.py

      - name: Commit and push if history updated
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f posted_history.txt ]; then
            git add posted_history.txt
            if git diff --cached --quiet; then
              echo "No changes in posted_history.txt"
            else
              git commit -m "chore: update posted_history.txt history [skip ci]"
              git pull --rebase
              git push
            fi
          fi

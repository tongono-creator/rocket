name: Promo Post (Shopee Ranking)

on:
  schedule:
    # จันทร์ / พุธ / ศุกร์ เวลา 18:30 Bangkok (11:30 UTC)
    - cron: '30 11 * * 1'   # Monday
    - cron: '30 11 * * 3'   # Wednesday
    - cron: '30 11 * * 5'   # Friday
  workflow_dispatch:

jobs:
  promo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run promo script
        env:
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          PAGE_ACCESS_TOKEN: ${{ secrets.PAGE_ACCESS_TOKEN }}
          PAGE_ID:           ${{ secrets.PAGE_ID }}
          IMMEDIATE:         ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python promo.py
